<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RefaccDigital | Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
}

.header {
    background-color: #1f2d3d;
    color: white;
    padding: 15px 30px;
    font-size: 20px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 85vh;
}

.login-card {
    background: white;
    padding: 40px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}

.login-card h2 {
    margin-bottom: 20px;
    color: #2c3e50;
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 95%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background-color: #3498db;
    color: white;
    font-size: 15px;
    cursor: pointer;
}

button:hover {
    background-color: #2980b9;
}

.error {
    color: red;
    margin-top: 10px;
    display: none;
}

.forgot-password {
    display: block;
    margin-top: 15px;
    font-size: 13px;
    color: #555;
    text-decoration: none;
}
.forgot-password:hover {
    text-decoration: underline;
}

.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.active { display: flex; }
.modal { background: white; border-radius: 10px; padding: 28px; width: 360px; }
.modal h3 { margin-bottom: 16px; color: #1f2d3d; }
.modal label { font-size: 13px; color: #555; display: block; margin-bottom: 5px; margin-top: 12px; }
.modal input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 7px; font-size: 14px; box-sizing: border-box; }
.modal-btns { display: flex; gap: 10px; margin-top: 16px; }
.btn-confirm { flex: 1; background: #1f2d3d; color: white; border: none; padding: 10px; border-radius: 7px; cursor: pointer; font-size: 14px; width: auto !important; }
.btn-cancel-modal { flex: 1; background: #eee; color: #555; border: none; padding: 10px; border-radius: 7px; cursor: pointer; font-size: 14px; width: auto !important; }
.feedback-modal { font-size: 13px; margin-top: 8px; display: none; padding: 7px 12px; border-radius: 6px; }
.feedback-modal.error { color: #e74c3c; background: #fdecea; }
.feedback-modal.success { color: #27ae60; background: #eafaf1; }

</style>

</head>

<body>

<div class="header">
    REFACCDIGITAL
</div>

<div class="container">
    <div class="login-card">
        <h2>Inicio de Sesión</h2>

        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">

        <button onclick="login()">Iniciar sesión</button>

        <p class="error" id="error">Usuario o contraseña incorrectos</p>

        <a href="#" class="forgot-password" onclick="abrirModalRecuperar(event)">¿Olvidaste tu contraseña?</a>
    </div>
</div>

<div class="modal-overlay" id="modalRecuperar">
    <div class="modal">
        <h3>Recuperar Contraseña</h3>
        <p style="font-size:13px;color:#888;">Ingresa tu correo electrónico para restablecer tu contraseña.</p>
        <label>Correo Electrónico</label>
        <input type="email" id="recuperarEmail" placeholder="tu@correo.com">
        <p class="feedback-modal" id="feedbackModal"></p>
        <div class="modal-btns">
            <button class="btn-cancel-modal" onclick="cerrarModalRecuperar()">Cancelar</button>
            <button class="btn-confirm" onclick="enviarRecuperacion()">Enviar</button>
        </div>
    </div>
</div>

<script src="http://localhost:3000/js/sesion.js"></script>

</body>
</html>
